<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>헤더 영역</title>
    <link
      rel="shortcut icon"
      href="/favicon/likelion.ico"

                      x1="143.36"
                      x2="143.36"
                      y1="145.635"
                      y2="68.906"
                      gradientUnits="userSpaceOnUse"
                    >
                      <stop stop-color="#EF5394" />
                      <stop offset=".65" stop-color="#8B52A0" />

                    <linearGradient

                  id="arrow-svg"
                  class="transition-transform duration-75"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path stroke="#fff" stroke-width="2" d="m18 9-6 6-6-6" />
                </svg>

            </li>

            </li>
            <li class="support button-menu max-[900px]:hidden">

            </li>
            <li class="service button-menu max-[900px]:hidden">

            </li>

              <svg
                id="arrow-svg"
                class="transition-transform duration-75"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"

                <path stroke="#fff" stroke-width="2" d="m18 9-6 6-6-6" />

                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="#fff"
                  stroke-linecap="round"
                  stroke-width="2"
                  d="M18 10H6m12 4H6"
                />
              </svg>
